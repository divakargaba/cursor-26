<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: rgba(0,0,0,0.85); cursor: crosshair; user-select: none; }

  #instruction {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #fff; font-family: 'Segoe UI', sans-serif; font-size: 28px; font-weight: 600;
    text-align: center; pointer-events: none; z-index: 10;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  }
  #instruction .sub { font-size: 16px; color: #aaa; margin-top: 8px; font-weight: 400; }

  .target {
    position: fixed; width: 40px; height: 40px; border-radius: 50%;
    border: 3px solid #ff3333; background: rgba(255,50,50,0.3);
    display: none; z-index: 20; cursor: crosshair;
    animation: pulse 1s ease-in-out infinite;
  }
  .target::after {
    content: ''; position: absolute; top: 50%; left: 50%;
    width: 8px; height: 8px; background: #ff3333; border-radius: 50%;
    transform: translate(-50%, -50%);
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.3); opacity: 0.7; }
  }

  #done {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #4f4; font-family: 'Segoe UI', sans-serif; font-size: 28px; font-weight: 600;
    display: none; z-index: 10; text-align: center;
  }
  #done .sub { font-size: 16px; color: #aaa; margin-top: 8px; font-weight: 400; }
</style>
</head>
<body>

<div class="target" id="target"></div>
<div id="instruction">
  Click the red target at each corner of your screen
  <div class="sub">This calibrates click accuracy (4 clicks total)</div>
</div>
<div id="done">Corners locked in!<div class="sub">Running 65-point grid probe now...</div></div>

<script>
  const target = document.getElementById('target');
  const instruction = document.getElementById('instruction');
  const doneEl = document.getElementById('done');

  // Corner sequence: TL, TR, BR, BL
  const corners = [
    { name: 'TOP-LEFT', css: { top: '5px', left: '5px' } },
    { name: 'TOP-RIGHT', css: { top: '5px', right: '5px', left: 'auto' } },
    { name: 'BOTTOM-RIGHT', css: { bottom: '5px', right: '5px', top: 'auto', left: 'auto' } },
    { name: 'BOTTOM-LEFT', css: { bottom: '5px', left: '5px', top: 'auto' } },
  ];

  let step = 0;
  const clicks = [];

  function showCorner(idx) {
    if (idx >= corners.length) {
      // Done — send results back
      target.style.display = 'none';
      instruction.style.display = 'none';
      doneEl.style.display = 'block';
      window.calibrationAPI.sendCorners(clicks);
      return;
    }

    const c = corners[idx];
    // Reset positioning
    target.style.top = ''; target.style.bottom = '';
    target.style.left = ''; target.style.right = '';
    Object.assign(target.style, c.css);
    target.style.display = 'block';
    instruction.innerHTML = `Click the red target at the <b>${c.name}</b> corner<div class="sub">${idx + 1} of 4</div>`;
  }

  // Listen for clicks anywhere on the page
  document.addEventListener('click', (e) => {
    if (step >= corners.length) return;

    // Record the click position (screen coordinates come from IPC, not DOM)
    // But we also record the DOM click for reference
    clicks.push({
      corner: corners[step].name,
      clientX: e.clientX,
      clientY: e.clientY,
      screenX: e.screenX,
      screenY: e.screenY,
    });

    step++;
    showCorner(step);
  });

  // Start
  setTimeout(() => showCorner(0), 500);
</script>
</body>
</html>
