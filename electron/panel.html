<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assistant</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: transparent;
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    color: #e0e0e0;
    font-size: 14px;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
    background: rgba(20, 20, 30, 0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    overflow: hidden;
  }

  /* Header */
  #header {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    -webkit-app-region: drag;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    flex-shrink: 0;
    height: 40px;
  }

  #header-text {
    font-size: 13px;
    font-weight: 600;
    color: #a0a0b0;
    flex: 1;
  }

  #context-pill {
    display: none;
    padding: 3px 10px;
    background: rgba(100, 100, 255, 0.15);
    border-radius: 10px;
    font-size: 11px;
    color: #8888ff;
    margin-right: 8px;
  }

  .header-btn {
    -webkit-app-region: no-drag;
    background: none;
    border: none;
    color: #707080;
    cursor: pointer;
    padding: 4px 8px;
    font-size: 14px;
    border-radius: 6px;
    transition: background 0.15s, color 0.15s;
  }

  .header-btn:hover {
    background: rgba(255, 255, 255, 0.08);
    color: #c0c0d0;
  }

  .header-btn.pinned {
    color: #7c72f0;
  }

  /* Orb section */
  #orb-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 120px;
    flex-shrink: 0;
    padding: 10px 0;
  }

  #orb {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: #2a2a3a;
    box-shadow: 0 0 20px rgba(100, 100, 150, 0.2);
    transition: background 0.4s, box-shadow 0.4s;
    animation: breathe 3s ease-in-out infinite;
    position: relative;
  }

  #orb.listening {
    background: radial-gradient(circle, #7c72f0, #4a3fd4);
    box-shadow: 0 0 30px rgba(124, 114, 240, 0.6);
    animation: pulse-ring 1s ease-in-out infinite;
  }

  #orb.thinking {
    background: radial-gradient(circle, #f0a020, #d06010);
    box-shadow: 0 0 25px rgba(240, 160, 32, 0.5);
    animation: spin-arc 1.2s linear infinite;
  }

  #orb.speaking {
    background: radial-gradient(circle, #20c060, #10a040);
    box-shadow: 0 0 25px rgba(32, 192, 96, 0.5);
    animation: wave 0.8s ease-in-out infinite;
  }

  #orb-status {
    margin-top: 8px;
    font-size: 13px;
    color: #606070;
    transition: color 0.3s;
  }

  #orb-section.listening #orb-status { color: #7c72f0; }
  #orb-section.thinking #orb-status { color: #f0a020; }
  #orb-section.speaking #orb-status { color: #20c060; }

  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  @keyframes pulse-ring {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.08); opacity: 0.8; }
  }

  @keyframes spin-arc {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  @keyframes wave {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }

  /* Messages area */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 280px;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 2px;
  }

  .message {
    max-width: 85%;
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.45;
    word-wrap: break-word;
    animation: fadeIn 0.15s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user {
    align-self: flex-end;
    background: rgba(139, 92, 246, 0.3);
    color: #d0d0f0;
    border-bottom-right-radius: 4px;
  }

  .message.assistant {
    align-self: flex-start;
    background: rgba(255, 255, 255, 0.07);
    color: #d0d0dd;
    border-bottom-left-radius: 4px;
  }

  /* Typing indicator */
  .typing-indicator {
    align-self: flex-start;
    padding: 10px 16px;
    display: none;
    font-size: 12px;
    color: #707080;
  }

  .typing-indicator .status-text {
    display: none;
    font-style: italic;
  }

  .typing-indicator .dots span {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: #606070;
    border-radius: 50%;
    margin-right: 4px;
    animation: bounce 1.2s infinite;
  }

  .typing-indicator .dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator .dots span:nth-child(3) { animation-delay: 0.4s; margin-right: 0; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* Action preview card */
  #action-preview {
    display: none;
    margin: 8px 14px;
    padding: 12px;
    background: rgba(255, 200, 50, 0.08);
    border: 1px solid rgba(255, 200, 50, 0.2);
    border-radius: 10px;
    flex-shrink: 0;
  }

  #action-preview .preview-label {
    font-size: 11px;
    color: #c0a030;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  #action-summary {
    font-size: 13px;
    color: #d0d0dd;
    margin-bottom: 8px;
  }

  #action-risks {
    font-size: 12px;
    color: #e08050;
    margin-bottom: 10px;
  }

  #action-risks:empty { display: none; }

  .preview-actions {
    display: flex;
    gap: 8px;
  }

  .preview-actions button {
    padding: 6px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    transition: opacity 0.15s;
  }

  .preview-actions button:hover { opacity: 0.85; }

  #btn-confirm {
    background: rgba(80, 180, 80, 0.3);
    color: #80dd80;
  }

  #btn-cancel {
    background: rgba(255, 255, 255, 0.06);
    color: #a0a0b0;
  }

  /* Input bar */
  #input-bar {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
    gap: 8px;
    flex-shrink: 0;
  }

  #btn-mic {
    width: 40px;
    height: 40px;
    font-size: 20px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.06);
    color: #8080dd;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, color 0.15s;
    flex-shrink: 0;
  }

  #btn-mic:hover {
    background: rgba(100, 100, 255, 0.15);
    color: #a0a0ff;
  }

  #btn-mic.listening {
    color: #7c72f0;
    background: rgba(124, 114, 240, 0.2);
    animation: pulse 1.2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  #text-input {
    flex: 1;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 8px;
    padding: 8px 12px;
    color: #e0e0e0;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }

  #text-input:focus {
    border-color: rgba(124, 114, 240, 0.4);
  }

  #text-input::placeholder {
    color: #505060;
  }

  #hotkey-hint {
    font-size: 10px;
    color: #404050;
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div id="header">
    <span id="header-text">AI Assistant</span>
    <span id="context-pill"></span>
    <button class="header-btn" id="btn-pin" title="Pin panel open">&#x1F4CC;</button>
    <button class="header-btn" id="btn-clear" title="Clear chat">&#x2715;</button>
    <button class="header-btn" id="btn-close" title="Close panel">&#x2014;</button>
  </div>

  <!-- Orb -->
  <div id="orb-section">
    <div id="orb"></div>
    <div id="orb-status">Ready</div>
  </div>

  <!-- Chat history -->
  <div id="messages"></div>

  <div class="typing-indicator" id="typing">
    <div class="dots"><span></span><span></span><span></span></div>
    <div class="status-text" id="status-text"></div>
  </div>

  <!-- Action preview -->
  <div id="action-preview">
    <div class="preview-label">Action Preview</div>
    <div id="action-summary"></div>
    <div id="action-risks"></div>
    <div class="preview-actions">
      <button id="btn-confirm">Do it</button>
      <button id="btn-cancel">Cancel</button>
    </div>
  </div>

  <!-- Input bar -->
  <div id="input-bar">
    <button id="btn-mic" title="Click to speak">&#x1F3A4;</button>
    <input type="text" id="text-input" placeholder="Type a message..." autocomplete="off">
    <span id="hotkey-hint">Ctrl+Shift+Space</span>
  </div>
</div>

<script src="../src/voice.js"></script>
<script>
  const messagesEl = document.getElementById('messages');
  const typingEl = document.getElementById('typing');
  const previewEl = document.getElementById('action-preview');
  const summaryEl = document.getElementById('action-summary');
  const risksEl = document.getElementById('action-risks');
  const orbEl = document.getElementById('orb');
  const orbStatusEl = document.getElementById('orb-status');
  const orbSectionEl = document.getElementById('orb-section');
  const textInput = document.getElementById('text-input');

  let currentActionId = null;
  let ttsEnabled = true;
  let isPinned = false;
  let autoCloseTimer = null;

  // --- Orb state ---
  function setOrbState(state) {
    orbEl.className = '';
    orbSectionEl.className = '';
    if (state && state !== 'idle') {
      orbEl.classList.add(state);
      orbSectionEl.classList.add(state);
    }
    const labels = { idle: 'Ready', listening: 'Listening...', thinking: 'Thinking...', speaking: 'Speaking...' };
    orbStatusEl.textContent = labels[state] || labels.idle;
    window.aiAssistant.setTrayState(state || 'idle');
  }

  // --- TTS ---
  function speak(text) {
    if (!ttsEnabled || !window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = 1.1;
    utter.pitch = 1.0;
    utter.volume = 1.0;
    const voices = window.speechSynthesis.getVoices();
    const preferred = voices.find(v => v.name.includes('Microsoft Zira') || v.name.includes('Microsoft David') || v.name.includes('Google'));
    if (preferred) utter.voice = preferred;
    utter.onstart = () => setOrbState('speaking');
    utter.onend = () => setOrbState('idle');
    window.speechSynthesis.speak(utter);
  }

  // --- Messages ---
  function addMessage(role, text) {
    const bubble = document.createElement('div');
    bubble.className = `message ${role}`;
    bubble.textContent = text;
    messagesEl.appendChild(bubble);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  const statusTextEl = document.getElementById('status-text');

  function showTyping(statusMsg) {
    typingEl.style.display = 'block';
    if (statusMsg) {
      statusTextEl.textContent = statusMsg;
      statusTextEl.style.display = 'inline';
    } else {
      statusTextEl.style.display = 'none';
    }
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideTyping() {
    typingEl.style.display = 'none';
    statusTextEl.style.display = 'none';
  }

  // --- Action preview ---
  function showActionPreview(preview) {
    currentActionId = preview.action_id;
    summaryEl.textContent = preview.summary;
    if (preview.risks && preview.risks.length > 0) {
      risksEl.textContent = '\u26A0 ' + preview.risks.join(' \u2022 ');
    } else {
      risksEl.textContent = '';
    }
    previewEl.style.display = 'block';
  }

  function hideActionPreview() {
    previewEl.style.display = 'none';
    currentActionId = null;
  }

  // --- Send message ---
  async function sendMessage(text) {
    if (!text || !text.trim()) return;
    text = text.trim();

    addMessage('user', text);
    showTyping();
    setOrbState('thinking');

    try {
      const result = await window.aiAssistant.sendMessage(text);
      hideTyping();

      // Show panel AFTER response (without stealing focus via showInactive)
      window.aiAssistant.showPanel();

      if (result.ok) {
        addMessage('assistant', result.reply.text);
        speak(result.reply.text);

        if (result.reply.actionPreview) {
          showActionPreview(result.reply.actionPreview);
        }
      } else {
        setOrbState('idle');
        addMessage('assistant', 'Something went wrong. Try again.');
        speak('Something went wrong. Try again.');
      }
    } catch (err) {
      hideTyping();
      setOrbState('idle');
      addMessage('assistant', 'Connection error. Is the app running?');
    }
  }

  // --- Confirmation ---
  async function confirmAction() {
    if (!currentActionId) return;
    const actionId = currentActionId;
    hideActionPreview();
    await window.aiAssistant.confirmAction(actionId);
  }

  function cancelConfirmation() {
    if (!currentActionId) return;
    const actionId = currentActionId;
    hideActionPreview();
    window.aiAssistant.cancelAction(actionId);
  }

  // --- Clear chat ---
  function clearChat() {
    messagesEl.innerHTML = '';
    hideActionPreview();
    window.aiAssistant.clearHistory();
  }

  // --- Auto-close timer ---
  function startAutoClose() {
    clearAutoClose();
    if (isPinned || currentActionId) return;
    autoCloseTimer = setTimeout(() => {
      window.aiAssistant.hideOverlay();
    }, 8000);
  }

  function clearAutoClose() {
    if (autoCloseTimer) {
      clearTimeout(autoCloseTimer);
      autoCloseTimer = null;
    }
  }

  // --- Pin toggle ---
  const pinBtn = document.getElementById('btn-pin');
  pinBtn.addEventListener('click', () => {
    isPinned = !isPinned;
    pinBtn.classList.toggle('pinned', isPinned);
    if (isPinned) clearAutoClose();
  });

  // --- Event listeners ---
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      window.aiAssistant.hideOverlay();
    }
  });

  document.getElementById('btn-clear').addEventListener('click', clearChat);
  document.getElementById('btn-close').addEventListener('click', () => {
    window.aiAssistant.hideOverlay();
  });
  document.getElementById('btn-confirm').addEventListener('click', confirmAction);
  document.getElementById('btn-cancel').addEventListener('click', cancelConfirmation);

  // Text input submit on Enter
  textInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      const text = textInput.value;
      textInput.value = '';
      sendMessage(text);
    }
  });

  // Keep panel alive while user is interacting
  textInput.addEventListener('focus', clearAutoClose);

  // --- Voice input ---
  const micBtn = document.getElementById('btn-mic');
  const voice = new VoiceInput({
    onResult: (text) => {
      sendMessage(text);
    },
    onInterim: (text) => {
      showTyping(text);
    },
    onStart: () => {
      micBtn.classList.add('listening');
      setOrbState('listening');
    },
    onStop: () => {
      micBtn.classList.remove('listening');
    },
    onError: (msg) => {
      addMessage('assistant', msg);
      setOrbState('idle');
    },
  });
  micBtn.addEventListener('click', () => voice.toggle());

  // --- IPC listeners ---

  // Hotkey triggers voice
  window.aiAssistant.onStartListening(() => {
    voice.toggle();
  });

  // Auto-close when panel loses focus
  window.aiAssistant.onFocusLost(() => {
    startAutoClose();
  });

  // Confirmation requests from the agent
  window.aiAssistant.onConfirmationRequest((preview) => {
    currentActionId = preview.id;
    summaryEl.textContent = preview.summary;
    if (preview.risks && preview.risks.length > 0) {
      risksEl.textContent = preview.risks.join(' / ');
    } else {
      risksEl.textContent = '';
    }
    previewEl.style.display = 'block';
    speak(preview.summary);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    // Don't auto-close while confirmation is pending
    clearAutoClose();
  });

  // Agent progress events
  window.aiAssistant.onAgentProgress((info) => {
    if (info.type === 'status') {
      showTyping(info.text);
      setOrbState('thinking');
    } else if (info.type === 'text' && info.text) {
      addMessage('assistant', info.text);
      speak(info.text);
    }
  });

  // DOM context updates from Chrome extension
  window.aiAssistant.onDomContextUpdate((data) => {
    const pill = document.getElementById('context-pill');
    if (data && data.appType) {
      pill.textContent = data.appType;
      pill.style.display = 'inline-block';
    } else {
      pill.style.display = 'none';
    }
  });

  // Preload TTS voices
  if (window.speechSynthesis) {
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
  }
</script>
</body>
</html>
